kind = "web"
  previewPath = "/"
  title = "VideoGuard"
  version = "1.0.0"

  [[services]]
  localPort = 5000
  name = "web"
  paths = ["/"]

  [services.development]
  run = "python artifacts/flask-app/app.py"

  [services.production]

  [services.production.build]
  args = ["echo", "no-build-needed"]

  [services.production.run]
  args = ["python", "artifacts/flask-app/app.py"]

  [services.production.run.env]
  PORT = "5000"

  [services.production.health.startup]
  path = "/api/health"
  